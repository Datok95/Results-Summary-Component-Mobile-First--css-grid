<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

 
</head>
<body>

  <div class="container">
    <header>
      <div class="header-title">Your Result</div>
      <div class="grade">
        <div class="top">76</div>
        <div class="bottom">of 100</div>
      </div>
      <div class="info">
        <div class="info-title">Great</div>
        <p class="info-description">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </header>

    <main>
      <p class="main-title">Summary</p>
      <div class="items">
        <!--first item-->
        <div class="item reaction">
          <div class="item-img"><img src="assets/images/icon-reaction.svg" alt="reaction img"></div>
          <p class="item-name">Reaction</p>
          <div class="item-score">80 / <span>100</span></div>
        </div>

        <!--second item-->
        <div class="item memory">
          <div class="item-img"><img src="assets/images/icon-memory.svg" alt="memory img"></div>
          <p class="item-name">Memory</p>
          <div class="item-score">92 / <span>100</span></div>
        </div>

        <!--third item-->
        <div class="item verbal">
          <div class="item-img"><img src="assets/images/icon-verbal.svg" alt="verbal img"></div>
          <p class="item-name">Verbal</p>
          <div class="item-score">61 / <span>100</span></div>
        </div>

        <!--fourth item-->
        <div class="item visual">
          <div class="item-img"><img src="assets/images/icon-visual.svg" alt="verbal img"></div>
          <p class="item-name">Visual</p>
          <div class="item-score">73 / <span>100</span></div>
        </div>
      </div>

      <button>Continue</button>
    </main>
  </div>

  
  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Datok95</a>.
  </footer>
</body>
</html>
